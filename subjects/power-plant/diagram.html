<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thermal Power Plant – Animated Flow Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --coal:   #c0392b;
    --steam:  #1abc9c;
    --flue:   #c8a800;
    --ash:    #7f8c8d;
    --water:  #2980b9;
    --elec:   #f39c12;
    --bg:     #0d1117;
    --panel:  #161b22;
    --border: #30363d;
    --text:   #e6edf3;
    --muted:  #8b949e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  h1 {
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 6px;
    text-align: center;
  }
  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: .75rem;
    color: var(--muted);
    letter-spacing: .2em;
    margin-bottom: 24px;
    text-align: center;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 20px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .leg { display: flex; align-items: center; gap: 6px; font-size: .78rem; letter-spacing: .05em; }
  .leg-dot { width: 12px; height: 12px; border-radius: 50%; }

  /* ── SVG container ── */
  .diagram-wrap {
    width: 100%;
    max-width: 960px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 8px 40px #00000088;
  }

  svg { width: 100%; height: auto; display: block; }

  /* ── Component boxes ── */
  .box {
    rx: 4; ry: 4;
    filter: drop-shadow(0 2px 6px #0008);
  }

  /* ── Labels ── */
  .lbl {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 11px;
    fill: #fff;
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
  }
  .lbl-out {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 10px;
    fill: var(--muted);
    text-anchor: middle;
    pointer-events: none;
  }

  /* ── Animated flow dots ── */
  @keyframes flowCoal   { from{stroke-dashoffset:200} to{stroke-dashoffset:0} }
  @keyframes flowSteam  { from{stroke-dashoffset:200} to{stroke-dashoffset:0} }
  @keyframes flowFlue   { from{stroke-dashoffset:200} to{stroke-dashoffset:0} }
  @keyframes flowWater  { from{stroke-dashoffset:200} to{stroke-dashoffset:0} }
  @keyframes flowElec   { from{stroke-dashoffset:200} to{stroke-dashoffset:0} }

  .flow-coal  { stroke:var(--coal);  stroke-width:3; fill:none; stroke-dasharray:6 10; animation:flowCoal  1.4s linear infinite; }
  .flow-steam { stroke:var(--steam); stroke-width:3; fill:none; stroke-dasharray:6 10; animation:flowSteam 1.2s linear infinite; }
  .flow-flue  { stroke:var(--flue);  stroke-width:3; fill:none; stroke-dasharray:6 10; animation:flowFlue  1.6s linear infinite; }
  .flow-water { stroke:var(--water); stroke-width:3; fill:none; stroke-dasharray:6 10; animation:flowWater 1.8s linear infinite; }
  .flow-elec  { stroke:var(--elec);  stroke-width:3; fill:none; stroke-dasharray:6 10; animation:flowElec  1.0s linear infinite; }

  /* base pipe (static) */
  .pipe-coal  { stroke:var(--coal);  stroke-width:1.5; fill:none; opacity:.35; }
  .pipe-steam { stroke:var(--steam); stroke-width:1.5; fill:none; opacity:.35; }
  .pipe-flue  { stroke:var(--flue);  stroke-width:1.5; fill:none; opacity:.35; }
  .pipe-water { stroke:var(--water); stroke-width:1.5; fill:none; opacity:.35; }
  .pipe-elec  { stroke:var(--elec);  stroke-width:1.5; fill:none; opacity:.35; }

  /* arrowheads */
  .arrow-coal  { fill:var(--coal); }
  .arrow-steam { fill:var(--steam);}
  .arrow-flue  { fill:var(--flue); }
  .arrow-water { fill:var(--water);}
  .arrow-elec  { fill:var(--elec); }



  /* chimney smoke handled via SVG animate elements */

  /* pulse on boiler */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
  .pulse { animation: pulse 2s ease-in-out infinite; }

  /* alternator glow pulse */
  @keyframes altGlow {
    0%,100%{ filter:drop-shadow(0 0 4px #f39c12) drop-shadow(0 0 10px #e67e22); }
    50%    { filter:drop-shadow(0 0 10px #ffe066) drop-shadow(0 0 22px #f39c12); }
  }
  .alt-glow { animation: altGlow 1s ease-in-out infinite; }

  /* coal storage pulse */
  @keyframes coalPulse { 0%,100%{opacity:1} 50%{opacity:.55} }
  .coal-pulse { animation: coalPulse 1.2s ease-in-out infinite; }

  /* economizer heat shimmer */
  @keyframes econGlow { 0%,100%{opacity:1} 50%{opacity:.6} }
  .econ-glow { animation: econGlow 1.5s ease-in-out infinite; }

  /* condenser ripple */
  @keyframes condRipple { 0%{opacity:.7;r:4} 100%{opacity:0;r:14} }

  /* ── Orbiting stars inside draught fans ── */
  @keyframes orbitIDF  { from{transform:rotate(0deg)}   to{transform:rotate(360deg)} }
  @keyframes orbitIDF2 { from{transform:rotate(180deg)} to{transform:rotate(540deg)} }
  @keyframes orbitFDF  { from{transform:rotate(0deg)}   to{transform:rotate(360deg)} }
  @keyframes orbitFDF2 { from{transform:rotate(180deg)} to{transform:rotate(540deg)} }
  @keyframes starGlow {
    0%,100%{ filter:drop-shadow(0 0 3px #ffe566) drop-shadow(0 0 8px #ffb700); opacity:1; }
    50%    { filter:drop-shadow(0 0 7px #fff9b0) drop-shadow(0 0 16px #ffd000); opacity:.7; }
  }
  .idf-star1 { animation:orbitIDF  1.8s linear infinite; transform-box:fill-box; transform-origin:640px 100px; }
  .idf-star2 { animation:orbitIDF2 1.8s linear infinite; transform-box:fill-box; transform-origin:640px 100px; }
  .fdf-star1 { animation:orbitFDF  1.8s linear infinite; transform-box:fill-box; transform-origin:680px 170px; }
  .fdf-star2 { animation:orbitFDF2 1.8s linear infinite; transform-box:fill-box; transform-origin:680px 170px; }
  .star-shape { animation:starGlow 1.4s ease-in-out infinite; }

</style>
</head>
<body>

<h1>⚡ Thermal Power Plant</h1>
<div class="subtitle">ANIMATED PROCESS FLOW DIAGRAM</div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:var(--coal)"></div> Coal / Ash</div>
  <div class="leg"><div class="leg-dot" style="background:var(--steam)"></div> Steam Cycle</div>
  <div class="leg"><div class="leg-dot" style="background:var(--flue)"></div> Flue Gases / Air</div>
  <div class="leg"><div class="leg-dot" style="background:var(--water)"></div> Cooling Water</div>
  <div class="leg"><div class="leg-dot" style="background:var(--elec)"></div> Electricity</div>
</div>

<div class="diagram-wrap">
<svg viewBox="0 0 920 680" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- arrowhead markers -->
  <marker id="ac" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" class="arrow-coal"/></marker>
  <marker id="as" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" class="arrow-steam"/></marker>
  <marker id="af" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" class="arrow-flue"/></marker>
  <marker id="aw" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" class="arrow-water"/></marker>
  <marker id="ae" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" class="arrow-elec"/></marker>

  <!-- glow filters -->
  <filter id="glow-steam" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-flue" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="boilerGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#e74c3c"/>
    <stop offset="100%" stop-color="#922b21"/>
  </radialGradient>
  <radialGradient id="turbineGrad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1abc9c"/>
    <stop offset="100%" stop-color="#0e7d68"/>
  </radialGradient>
</defs>

<!-- ════════════════════════════════════
     PIPES  (static base)
════════════════════════════════════ -->
<!-- Coal feed -->
<line class="pipe-coal" x1="50" y1="300" x2="110" y2="300"/>
<line class="pipe-coal" x1="170" y1="300" x2="230" y2="300"/>
<line class="pipe-coal" x1="290" y1="300" x2="340" y2="300"/>
<!-- Ash return -->
<line class="pipe-coal" x1="290" y1="360" x2="230" y2="360"/>
<line class="pipe-coal" x1="170" y1="360" x2="110" y2="360"/>
<line class="pipe-coal" x1="50"  y1="360" x2="110" y2="360"/>

<!-- Boiler → SuperHeater → Valve → Turbine (steam, horizontal) -->
<line class="pipe-steam" x1="400" y1="300" x2="470" y2="300"/>
<line class="pipe-steam" x1="530" y1="300" x2="580" y2="300"/>
<line class="pipe-steam" x1="620" y1="300" x2="660" y2="300"/>
<!-- Turbine → Alternator -->
<line class="pipe-elec" x1="730" y1="300" x2="790" y2="300"/>
<!-- Turbine → Feed Water Heater (down) -->
<line class="pipe-steam" x1="695" y1="340" x2="695" y2="390"/>
<line class="pipe-steam" x1="580" y1="410" x2="695" y2="410"/>
<line class="pipe-steam" x1="580" y1="390" x2="580" y2="410"/>
<!-- Feed Water Heater → Feed Water Pump -->
<line class="pipe-steam" x1="580" y1="430" x2="580" y2="480"/>
<line class="pipe-steam" x1="540" y1="500" x2="580" y2="500"/>
<!-- Feed Water Pump → Condenser -->
<line class="pipe-water" x1="520" y1="500" x2="480" y2="500"/>
<line class="pipe-water" x1="460" y1="520" x2="460" y2="540"/>
<!-- Condenser loop -->
<line class="pipe-water" x1="400" y1="555" x2="330" y2="555"/>
<line class="pipe-water" x1="330" y1="555" x2="330" y2="490"/>
<!-- Boiler ↔ Economizer via water feed (vertical left) -->
<line class="pipe-steam" x1="370" y1="490" x2="370" y2="230"/>
<line class="pipe-steam" x1="370" y1="230" x2="420" y2="230"/>
<!-- Turbine exhaust down to condenser -->
<line class="pipe-steam" x1="695" y1="340" x2="695" y2="410"/>
<line class="pipe-steam" x1="695" y1="410" x2="695" y2="555"/>
<line class="pipe-steam" x1="695" y1="555" x2="500" y2="555"/>

<!-- Cooling Tower → Condenser -->
<line class="pipe-water" x1="770" y1="555" x2="700" y2="555"/>
<!-- Cooling Tower ↑ natural water source (bottom) -->
<line class="pipe-water" x1="800" y1="590" x2="800" y2="640"/>
<line class="pipe-water" x1="460" y1="640" x2="800" y2="640"/>
<line class="pipe-water" x1="460" y1="610" x2="460" y2="640"/>
<!-- Water Treatment → Feed Water Pump -->
<line class="pipe-water" x1="330" y1="600" x2="330" y2="490"/>

<!-- Flue: Boiler → SuperHeater → Economizer → Air Preheater → Chimney -->
<line class="pipe-flue" x1="400" y1="265" x2="480" y2="265"/>
<line class="pipe-flue" x1="480" y1="265" x2="480" y2="210"/>
<line class="pipe-flue" x1="420" y1="210" x2="480" y2="210"/>
<line class="pipe-flue" x1="420" y1="210" x2="420" y2="170"/>
<line class="pipe-flue" x1="420" y1="170" x2="460" y2="170"/>
<line class="pipe-flue" x1="500" y1="170" x2="580" y2="170"/>
<line class="pipe-flue" x1="580" y1="100" x2="580" y2="170"/>
<line class="pipe-flue" x1="580" y1="100" x2="640" y2="100"/>
<!-- Air Preheater → Boiler (hot air) -->
<line class="pipe-flue" x1="460" y1="155" x2="400" y2="155"/>
<line class="pipe-flue" x1="400" y1="155" x2="400" y2="265"/>
<!-- Forced Draught Fan → Air Preheater -->
<line class="pipe-flue" x1="660" y1="170" x2="620" y2="170"/>
<line class="pipe-flue" x1="500" y1="170" x2="540" y2="170"/>

<!-- ════════════════════════════════════
     ANIMATED FLOW OVERLAYS
════════════════════════════════════ -->
<!-- Coal -->
<line class="flow-coal" x1="50" y1="300" x2="340" y2="300" marker-end="url(#ac)"/>
<!-- Ash -->
<line class="flow-coal" x1="290" y1="360" x2="50" y2="360" marker-end="url(#ac)" style="animation-direction:reverse"/>
<!-- Steam main -->
<line class="flow-steam" x1="400" y1="300" x2="660" y2="300" marker-end="url(#as)"/>
<!-- Electricity -->
<line class="flow-elec" x1="730" y1="300" x2="790" y2="300" marker-end="url(#ae)"/>
<!-- Turbine → FWH -->
<polyline class="flow-steam" points="695,340 695,410 580,410 580,430" marker-end="url(#as)"/>
<!-- FWH → FWP → condenser (water cycle) -->
<polyline class="flow-water" points="580,480 580,500 460,500 460,555" marker-end="url(#aw)"/>
<!-- Condenser → back loop -->
<polyline class="flow-water" points="460,555 330,555 330,490 370,490" marker-end="url(#aw)"/>
<!-- Feed back to economizer/boiler -->
<polyline class="flow-steam" points="370,490 370,230 420,230" marker-end="url(#as)"/>
<!-- Exhaust steam → condenser -->
<polyline class="flow-steam" points="695,340 695,555 500,555" marker-end="url(#as)"/>
<!-- Cooling water -->
<polyline class="flow-water" points="800,590 800,640 460,640 460,610" marker-end="url(#aw)"/>
<line class="flow-water" x1="770" y1="555" x2="505" y2="555" marker-end="url(#aw)"/>
<!-- Flue gases -->
<polyline class="flow-flue" points="400,265 480,265 480,210 420,210 420,170 460,170" marker-end="url(#af)"/>
<polyline class="flow-flue" points="500,170 580,170 580,100 660,100" marker-end="url(#af)"/>
<!-- Hot air feed back -->
<polyline class="flow-flue" points="460,155 400,155 400,265" marker-end="url(#af)"/>
<!-- Forced draught fan → preheater -->
<line class="flow-flue" x1="660" y1="170" x2="505" y2="170" marker-end="url(#af)"/>

     COMPONENTS
════════════════════════════════════ -->
